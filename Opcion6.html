<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pandita</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.6) 0%, rgba(214, 10, 10, 1) 70%);
            margin: 0;
            font-family: 'Arial', sans-serif;
        }

        /* 1. CONTENEDOR PRINCIPAL (El "Botón" exterior) */
        .panel-amor {
            position: relative;
            width: 320px;
            height: 200px;
            background: linear-gradient(135deg, #a11abc, #a0161d);
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.3s, background 0.3s;
        }

        .panel-amor:hover {
            transform: scale(1.02);
        }

        .titulo-panel {
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
            font-style: italic;
        }

        /* 2. BOTÓN INTERIOR */
        .btn-generar {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-style: italic;

            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: background 0.2s, transform 0.1s;
            z-index: 10;
        }

        .btn-generar:hover {
            background-color: #c0392b;
        }

        .btn-generar:active {
            transform: scale(0.95);
        }

        /* 3. ELEMENTOS DE LA ANIMACIÓN (Panda y Corazón) */
        .panda {
            position: absolute;
            font-size: 50px;
            bottom: -60px;
            left: 20px;
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        /* Clase que añade JS para que el panda asome */
        .panda.activo {
            bottom: 20px;
        }

        .corazon-volador {
            position: absolute;
            bottom: 60px;
            left: 70px;
            background-color: #ff2a6d;
            color: white;
            padding: 15px 18px;
            border-radius: 50%;
            font-size: 0.75rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 5px 15px rgba(255, 42, 109, 0.4);
            opacity: 0;
            pointer-events: none;
            min-width: 50px;
            min-height: 50px;
        }

        /* Forma de corazón usando pseudo-elementos */
        .corazon-volador::before,
        .corazon-volador::after {
            content: "";
            position: absolute;
            background-color: #ff2a6d;
            border-radius: 50%;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .corazon-volador::before {
            top: -50%;
            left: 0;
        }
        .corazon-volador::after {
            left: 50%;
            top: 0;
        }

        /* Animación del Corazón al lanzar */
        @keyframes lanzarCorazon {
            0% {
                transform: translate(0, 0) scale(0.5) rotate(0deg);
                opacity: 0;
            }
            20% {
                opacity: 1;
            }
            100% {
                transform: translate(140px, -60px) scale(1.2) rotate(15deg);
                opacity: 0;
            }
        }

        .animar-corazon {
            animation: lanzarCorazon 1.2s forwards ease-out;
        }

        /* Animación extra para el oso panda cuando lanza */
        @keyframes lanzarPanda {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1) translateX(5px); }
        }
        
        .panda-lanza {
            animation: lanzarPanda 0.3s ease-in-out;
        }
    </style>
        
   
</head>
<body>

    <div class="panel-amor">
        <span class="titulo-panel">PANDA LISTO</span>
        
        <button class="btn-generar" id="btnLanzar">GENERAR PANDA</button>

        <div class="panda" id="panda">🐼</div>
        <div class="corazon-volador" id="corazon">Te quiero</div>
    </div>

    <script>
        const btnLanzar = document.getElementById('btnLanzar');
        const panda = document.getElementById('panda');
        const corazon = document.getElementById('corazon');

        btnLanzar.addEventListener('click', (e) => {
            // Evita que el clic en el botón afecte al panel exterior
            e.stopPropagation(); 

            // 1. Hace aparecer al panda si no se está mostrando
            panda.classList.add('activo');

            // 2. Pequeño brinco del panda al lanzar
            panda.classList.add('panda-lanza');
            setTimeout(() => panda.classList.remove('panda-lanza'), 300);

            // 3. Reinicia y activa la animación del corazón
            corazon.classList.remove('animar-corazon');
            void corazon.offsetWidth; // Truco de magia en JS para reiniciar CSS Animations
            corazon.classList.add('animar-corazon');
        });
    </script>

</body>
</html>
